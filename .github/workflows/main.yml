name: Build KartPADv3

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Clean vendored dependencies
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci

      - name: Init Capacitor iOS project
        run: |
          node ./node_modules/@capacitor/cli/bin/capacitor add ios || true
          node ./node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Patch Info.plist
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsLocalNetworking bool true" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsLocalNetworking true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocalNetworkUsageDescription string 'KartPADv3 necesita acceso a la red local para conectarse al servidor.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSLocalNetworkUsageDescription 'KartPADv3 necesita acceso a la red local para conectarse al servidor.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSBonjourServices array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSBonjourServices: string '_http._tcp'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSBonjourServices: string '_ws._tcp'" "$PLIST" 2>/dev/null || true

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/KartPADv3.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Package IPA
        run: |
          mkdir -p /tmp/Payload
          cp -r "$RUNNER_TEMP/KartPADv3.xcarchive/Products/Applications/App.app" /tmp/Payload/
          cd /tmp
          zip -r KartPADv3.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: KartPADv3-IPA
          path: /tmp/KartPADv3.ipa
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Clean vendored dependencies
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci

      - name: Init Capacitor Android project
        run: |
          node ./node_modules/@capacitor/cli/bin/capacitor add android || true
          node ./node_modules/@capacitor/cli/bin/capacitor sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KartPADv3-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Generate app icons
        run: |
          python -m pip install Pillow
          python tools/generate_app_icon.py

      - name: Build EXE
        shell: pwsh
        run: .\build_windows.ps1

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: KartPADv3-EXE
          path: dist/KartPADv3.exe
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [build-ios, build-android, build-windows]
    permissions:
      contents: write
    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: KartPADv3-IPA
          path: ./release-assets/

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: KartPADv3-APK
          path: ./release-assets/

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: KartPADv3-EXE
          path: ./release-assets/

      - name: Rename artifacts
        run: |
          mv ./release-assets/app-release-unsigned.apk ./release-assets/KartPADv3.apk 2>/dev/null || true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: "KartPADv3 - Latest"
          body: |
            ## Descarga KartPADv3

            | Archivo | Uso |
            |---------|-----|
            | **KartPADv3.exe** | Windows |
            | **KartPADv3.apk** | Android |
            | **KartPADv3.ipa** | iPhone o iPad |

            Notas:
            - El IPA generado por CI es unsigned.
            - El PC y el movil deben estar en la misma Wi-Fi.
            - Dolphin debe usar DSUClient en `127.0.0.1:26760`.
          draft: false
          prerelease: false
          files: |
            ./release-assets/KartPADv3.exe
            ./release-assets/KartPADv3.apk
            ./release-assets/KartPADv3.ipa
          make_latest: true
